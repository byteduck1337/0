<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/0byte/ - Secure Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="app-title">/0byte/</div>

        <div class="user-info">
            <div class="username-display">
                <span class="username-text" id="username-display"></span>
                <button class="copy-key-btn" onclick="copyMyKey()">📋 Copy Key</button>
            </div>
        </div>

        <div class="partner-section">
            <div class="input-group">
                <input type="text" class="partner-input" id="partner-key-input" placeholder="Paste partner's key">
                <button class="connect-btn" onclick="connectToPartner()">🔗 Connect</button>
            </div>
            <div class="status-message" id="connection-status"></div>
        </div>

        <div class="chat-section hidden" id="chat-section">
            <div class="chat-header">
                Chat with <span id="partner-name"></span>
                <span class="online-status" id="online-status"></span>
            </div>
            <div id="messages"></div>
            <div class="message-input-section">
                <input type="text" class="message-input" id="message-input" placeholder="Type a message..."
                       onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>

        <div class="chat-section hidden" id="waiting-section">
            <div class="waiting-indicator">
                <h3>Waiting for partner...</h3>
                <p>Share your key with your partner to start chatting</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

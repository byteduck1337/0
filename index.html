<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/0byte/ — P2P Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="app-title">/0byte/</span>
                <button onclick="showSettings()">⚙️</button>
            </div>
            <div class="contact-list" id="contact-list"></div>
            <div class="sidebar-footer">
                <button onclick="addContactPrompt()">+ New Chat</button>
            </div>
        </div>
        <div class="main hidden" id="main-chat">
            <div class="chat-header">
                <button class="back-btn" onclick="goBack()">←</button>
                <span class="partner-info">
                    <span class="partner-avatar" id="partner-avatar"></span>
                    <span id="partner-name-display"></span>
                </span>
                <span class="online-status" id="online-status">⚪ Disconnected</span>
            </div>
            <div class="signaling-box" id="signaling-box">
                <div class="signal-row">
                    <label>Your signal: <textarea id="local-signal" rows="2" readonly></textarea></label>
                    <button onclick="generateOffer()">Start connection</button>
                    <button onclick="copyLocalSignal()">Copy</button>
                </div>
                <div class="signal-row">
                    <label>Partner's offer: <textarea id="remote-offer" rows="2" placeholder="Paste partner's offer"></textarea></label>
                    <button onclick="acceptOffer()">Answer</button>
                </div>
                <div class="signal-row">
                    <label>Partner's answer: <textarea id="remote-answer" rows="2" placeholder="Paste partner's answer"></textarea></label>
                    <button onclick="completeConnection()">Complete</button>
                </div>
            </div>
            <div id="pinned-messages"></div>
            <div id="messages"></div>
            <div class="message-input-section">
                <input type="text" class="message-input" id="message-input" placeholder="Type a message..."
                       onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
        <div class="settings-modal hidden" id="settings-modal">
            <div class="modal-content">
                <h3>Settings</h3>
                <label>Name: <input type="text" id="name-input"></label>
                <label>Avatar (emoji): <input type="text" id="avatar-input" maxlength="4"></label>
                <div class="theme-switch">
                    <span>Dark theme (orange)</span>
                    <label class="toggle">
                        <input type="checkbox" id="theme-toggle" onchange="toggleTheme()">
                        <span class="slider"></span>
                    </label>
                </div>
                <button onclick="saveSettings()">Save</button>
                <button onclick="closeSettings()">Cancel</button>
            </div>
        </div>
        <div class="add-contact-modal hidden" id="add-contact-modal">
            <div class="modal-content">
                <h3>Add Contact</h3>
                <input type="text" id="new-contact-key" placeholder="Partner's encryption key">
                <button onclick="connectToPartner()">Add</button>
                <button onclick="closeAddContact()">Cancel</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

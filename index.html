<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/0byte/</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="app-title">/0byte/</span>
                <button onclick="showSettings()">⚙️</button>
            </div>
            <div class="contact-list" id="contact-list"></div>
            <div class="sidebar-footer">
                <button onclick="promptNewRoom()">New Chat</button>
            </div>
        </div>
        <div class="main hidden" id="main-chat">
            <div class="chat-header">
                <button class="back-btn" onclick="goBack()">←</button>
                <span class="partner-info">
                    <span class="partner-avatar" id="partner-avatar"></span>
                    <span id="partner-name-display"></span>
                </span>
                <span class="online-status" id="online-status">⚪ Disconnected</span>
            </div>
            <div class="signaling-area" id="signaling-area">
                <div class="signal-row">
                    <textarea id="offer-textarea" placeholder="Offer from partner" rows="2"></textarea>
                    <button onclick="joinRoom()">Join Room</button>
                </div>
                <div class="signal-row">
                    <textarea id="answer-textarea" placeholder="Answer from partner" rows="2"></textarea>
                    <button onclick="completeConnection()">Complete connection</button>
                </div>
                <div class="signal-row">
                    <button onclick="createRoom()" id="create-room-btn">Create Room (copy offer)</button>
                </div>
            </div>
            <div id="pinned-messages"></div>
            <div id="messages"></div>
            <div class="message-input-section">
                <input type="text" class="message-input" id="message-input" placeholder="Type a message..."
                       onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
        <div class="modal hidden" id="new-room-modal">
            <div class="modal-content">
                <h3>Start a new chat</h3>
                <p>This will create a new room and copy the connection offer for your partner.</p>
                <button onclick="createRoom(); closeNewRoomModal();">Create Room</button>
                <button onclick="closeNewRoomModal()">Cancel</button>
            </div>
        </div>
        <div class="modal hidden" id="settings-modal">
            <div class="modal-content">
                <h3>Settings</h3>
                <label>Name: <input type="text" id="name-input"></label>
                <label>Avatar (emoji): <input type="text" id="avatar-input" maxlength="4"></label>
                <div class="theme-switch">
                    <span>Dark orange theme</span>
                    <label class="toggle">
                        <input type="checkbox" id="theme-toggle" onchange="toggleTheme()">
                        <span class="slider"></span>
                    </label>
                </div>
                <button onclick="saveSettings()">Save</button>
                <button onclick="closeSettings()">Cancel</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

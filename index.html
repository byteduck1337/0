<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>/0byte/</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="app-title">/0byte/</span>
                <button onclick="showSettings()" aria-label="Settings">⚙️</button>
            </div>
            <div class="contact-list" id="contact-list"></div>
            <div class="sidebar-footer">
                <button onclick="promptNewRoom()">+ New Chat</button>
            </div>
        </div>
        <div class="main hidden" id="main-chat">
            <div class="chat-header">
                <button class="back-btn" onclick="goBack()">←</button>
                <span class="partner-info">
                    <span class="partner-avatar" id="partner-avatar"></span>
                    <span id="partner-name-display"></span>
                </span>
                <span class="online-status" id="online-status">⚪ Disconnected</span>
            </div>
            <!-- Отладочная панель ключей -->
            <div class="key-debug" id="key-debug">
                <span>🔑 Your key: <code id="my-key-display"></code></span>
                <span>🔑 Partner key: <code id="partner-key-display">(waiting...)</code></span>
            </div>
            <div id="pinned-messages"></div>
            <div id="messages"></div>
            <div class="message-input-section">
                <input type="text" class="message-input" id="message-input" placeholder="Type a message..."
                       onkeypress="if(event.key==='Enter') sendMessage()" enterkeyhint="send">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
        <div class="modal hidden" id="new-room-modal">
            <div class="modal-content">
                <h3>New Chat</h3>
                <div id="room-create">
                    <button onclick="createRoom()">Create Room</button>
                    <p>— or —</p>
                    <textarea id="offer-textarea" placeholder="Paste partner's offer here" rows="4"></textarea>
                    <button onclick="joinRoom()">Join Room</button>
                </div>
                <div id="room-waiting" class="hidden">
                    <p>Offer copied!<br>Send it to your partner.</p>
                    <textarea id="offer-display" rows="4" readonly></textarea>
                    <button onclick="copyOffer()">Copy again</button>
                    <label>Answer from partner:</label>
                    <textarea id="answer-textarea" rows="4" placeholder="Paste answer here"></textarea>
                    <button onclick="completeConnection()">Complete</button>
                </div>
                <div id="room-joining" class="hidden">
                    <p>Answer copied!<br>Send it back to your partner.</p>
                    <textarea id="answer-display" rows="4" readonly></textarea>
                    <button onclick="copyAnswer()">Copy again</button>
                    <button onclick="closeNewRoomModal()">Done</button>
                </div>
                <button onclick="closeNewRoomModal()" style="margin-top:8px;">Cancel</button>
            </div>
        </div>
        <div class="modal hidden" id="settings-modal">
            <div class="modal-content">
                <h3>Settings</h3>
                <label>Name: <input type="text" id="name-input"></label>
                <label>Avatar (emoji): <input type="text" id="avatar-input" maxlength="4"></label>
                <div class="theme-switch">
                    <span>Dark orange theme</span>
                    <label class="toggle">
                        <input type="checkbox" id="theme-toggle" onchange="toggleTheme()">
                        <span class="slider"></span>
                    </label>
                </div>
                <button onclick="saveSettings()">Save</button>
                <button onclick="closeSettings()">Cancel</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
